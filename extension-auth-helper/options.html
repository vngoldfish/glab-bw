<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bawui Auth Helper - Options</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 320px;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0c10, #121620);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      background: rgba(20, 24, 33, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      text-align: center;
    }

    .header img {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 13px;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(10, 12, 16, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(10, 12, 16, 0.8);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), 0 4px 12px rgba(0, 0, 0, 0.3);
    }

    .btn-save {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-save:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    .status-msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      opacity: 0;
      transform: translateY(-5px);
      transition: all 0.3s ease;
      display: none;
    }

    .status-msg.show {
      opacity: 1;
      transform: translateY(0);
      display: block;
    }

    .status-msg.success {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .status-msg.error {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icon48.png" alt="Bawui Logo">
      <h1>Bawui Auth Helper</h1>
      <p>Configure extension preferences</p>
    </div>

    <div class="form-group">
      <label for="syncPort">Local Backend Port</label>
      <div class="input-wrapper">
        <input type="number" id="syncPort" min="1" max="65535" placeholder="18923">
      </div>
    </div>

    <button class="btn-save" id="btnSave">
      <span>💾</span> Save Settings
    </button>

    <div class="status-msg" id="statusMsg"></div>

    <div class="footer">
      Bawui Companion Service
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
