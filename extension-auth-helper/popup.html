<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #12141a;
      color: #e0e0e0;
      padding: 0;
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #1a1f2e, #1e2436);
      border-bottom: 1px solid #2a2f3d;
    }

    .header img {
      width: 26px;
      height: 26px;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }

    .header h1 a {
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s, text-decoration 0.2s;
    }

    .header h1 a:hover {
      color: #60a5fa;
      text-decoration: underline;
    }

    .header .version {
      font-size: 10px;
      color: #555;
      background: #1e2230;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid #2a2f3d;
    }

    .stats-bar {
      display: flex;
      gap: 1px;
      background: #1a1d25;
      border-bottom: 1px solid #2a2f3d;
    }

    .stat-item {
      flex: 1;
      text-align: center;
      padding: 10px 8px;
      background: #161920;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      color: #3b82f6;
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .content {
      padding: 12px 14px;
    }

    .status-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: #1a1d25;
      border-radius: 8px;
      border: 1px solid #22262e;
      transition: border-color 0.2s;
    }

    .status-row:hover {
      border-color: #333;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-ok {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e66;
    }

    .dot-warn {
      background: #f59e0b;
      box-shadow: 0 0 8px #f59e0b66;
    }

    .dot-err {
      background: #ef4444;
      box-shadow: 0 0 8px #ef444466;
    }

    .dot-loading {
      background: #3b82f6;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .status-icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .status-label {
      font-size: 11px;
      font-weight: 600;
      flex: 1;
      color: #ccc;
    }

    .status-value {
      font-size: 10px;
      color: #777;
      text-align: right;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    .btn {
      flex: 1;
      padding: 9px 8px;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-1px);
    }

    .btn-success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
    }

    .btn-success:hover {
      background: linear-gradient(135deg, #16a34a, #15803d);
      transform: translateY(-1px);
    }

    .btn-warning {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
    }

    .btn-warning:hover {
      background: linear-gradient(135deg, #d97706, #b45309);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #1e2230;
      color: #aaa;
      border: 1px solid #2a2f3d;
    }

    .btn-secondary:hover {
      background: #252a3a;
      border-color: #3a3f4d;
      color: #ccc;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-full {
      width: 100%;
      margin-bottom: 6px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #1a1d25;
      border-radius: 8px;
      border: 1px solid #22262e;
      margin-bottom: 10px;
    }

    .toggle-row .toggle-label {
      font-size: 11px;
      color: #aaa;
      flex: 1;
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #888;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle-switch input:checked+.toggle-slider {
      background: #22c55e;
    }

    .toggle-switch input:checked+.toggle-slider::before {
      transform: translateX(16px);
      background: #fff;
    }

    .result-box {
      padding: 8px 10px;
      background: #1a1d25;
      border-radius: 8px;
      border: 1px solid #22262e;
      font-size: 10px;
      color: #777;
      display: none;
      word-break: break-all;
      max-height: 60px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .result-box.show {
      display: block;
    }

    .result-box.success {
      border-color: #22c55e33;
      color: #22c55e;
    }

    .result-box.error {
      border-color: #ef444433;
      color: #ef4444;
    }

    .footer {
      text-align: center;
      font-size: 9px;
      color: #444;
      padding: 6px 0 10px;
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="icon48.png" alt="icon">
    <h1><a href="https://duckmartians.info/g-labs" target="_blank">Bawui Auth Helper</a>
    </h1>
    <span class="version">v7.0.0</span>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-value" id="statTokens">0</div>
      <div class="stat-label">Tokens</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statStatus" style="font-size:14px;">—</div>
      <div class="stat-label">Service</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statLast" style="font-size:11px;color:#777;">—</div>
      <div class="stat-label">Last Token</div>
    </div>
  </div>

  <div class="content">
    <div class="status-grid">
      <div class="status-row">
        <div class="status-dot dot-loading" id="dotBridge"></div>
        <span class="status-icon">🔗</span>
        <span class="status-label">App Bridge</span>
        <span class="status-value" id="valBridge">Checking...</span>
      </div>
      <div class="status-row">
        <div class="status-dot dot-loading" id="dotTab"></div>
        <span class="status-icon">🌐</span>
        <span class="status-label">Labs Session</span>
        <span class="status-value" id="valTab">Checking...</span>
      </div>
      <div class="status-row">
        <div class="status-dot dot-loading" id="dotRecaptcha"></div>
        <span class="status-icon">🛡️</span>
        <span class="status-label">Verification</span>
        <span class="status-value" id="valRecaptcha">Checking...</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnTest">🔍 Check</button>
      <button class="btn btn-success" id="btnTestCaptcha">⚡ Verify</button>
      <button class="btn btn-warning" id="btnRefresh">🔄 Refresh</button>
    </div>

    <button class="btn btn-secondary btn-full" id="btnOpenTab">📂 Open Google Labs</button>




    <div class="result-box" id="resultBox"></div>

    <div class="footer">Bawui extended authentication service</div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
