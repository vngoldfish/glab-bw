<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font: 12px/1.4 system-ui, sans-serif;
      margin: 0;
      padding: 12px;
      width: 280px;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 { font-size: 13px; margin: 0 0 8px; color: #f8fafc; }
    .row { display: flex; justify-content: space-between; gap: 8px; margin: 4px 0; }
    .row strong { color: #a5b4fc; text-align: right; word-break: break-all; }
    .hint {
      margin-top: 10px;
      padding: 8px;
      background: #1e293b;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 11px;
    }
    code { color: #7dd3fc; }
    .ok { color: #4ade80; }
    .warn { color: #fbbf24; }
    .bad { color: #f87171; }
  </style>
</head>
<body>
  <h1>Grok Statsig companion</h1>
  <div class="row"><span>Bridge</span><strong id="conn">…</strong></div>
  <div class="row"><span>Tab</span><strong id="tab">…</strong></div>
  <div class="row"><span>x-statsig-id</span><strong id="sig">…</strong></div>
  <div class="row"><span>via</span><strong id="via">…</strong></div>
  <div class="row"><span>error</span><strong id="err">—</strong></div>
  <div class="hint">
    Dùng <b>cùng</b> Auth Helper gốc. Extension này <b>không F5</b> tab.
    <br /><br />
    (1) Mở <code>https://grok.com/imagine</code><br />
    (2) Gen <b>1 ảnh</b> trên web (giữ tab, không đóng)<br />
    (3) Badge <span class="ok">OK</span> → gen trong app ngay
  </div>
  <script src="popup.js"></script>
</body>
</html>
